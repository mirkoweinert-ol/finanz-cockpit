// Anzahl voller Monate zwischen zwei Daten
function monthsBetween(start, end = new Date()) {
  const s = new Date(start);
  const e = new Date(end);
  if (isNaN(s)) return 0;
  let m = (e.getFullYear() - s.getFullYear()) * 12 + (e.getMonth() - s.getMonth());
  if (e.getDate() < s.getDate()) m -= 1;
  return Math.max(0, m);
}

// KUMTILG-Engine: Restschuld zum heutigen Tag aus Annuitätendarlehen
function restschuldEinzel(startKredit, zinsProzent, monatsRate, auszahlungsdatum) {
  const n = monthsBetween(auszahlungsdatum);
  const r = zinsProzent / 100 / 12;
  if (r === 0) return Math.max(0, startKredit - monatsRate * n);
  const f = Math.pow(1 + r, n);
  const bal = startKredit * f - monatsRate * (f - 1) / r;
  return Math.max(0, bal);
}

// Multi-Kredit-Wrapper: addiert Restschulden aller Kredite eines Objekts
function restschuldHeute(startKredit, zinsProzent, monatsRate, kaufdatum, kredite) {
  if (kredite && kredite.length > 0) {
    return kredite.reduce((s, k) => s + restschuldEinzel(k.start, k.zins, k.rate, k.auszahlung), 0);
  }
  return restschuldEinzel(startKredit, zinsProzent, monatsRate, kaufdatum);
}

// Gesamt-Monatsrate aus allen Krediten (für Cashflow-Anzeige)
function gesamtRate(p) {
  if (p.kredite && p.kredite.length > 0) return p.kredite.reduce((s, k) => s + k.rate, 0);
  return p.rate;
}
function rateAufteilung(restschuld, zinsProzent, monatsRate) {
  const zinsAnteil = restschuld * (zinsProzent / 100 / 12);
  return {
    zins: zinsAnteil,
    tilgung: Math.max(0, monatsRate - zinsAnteil)
  };
}

// Zinseszins-Projektion (monatliche Sparrate + Rendite p.a.)
function projektion(start, monatsSparrate, renditeProzent, jahre) {
  const r = renditeProzent / 100 / 12;
  const arr = [];
  let v = start;
  for (let y = 0; y <= jahre; y++) {
    arr.push({
      jahr: y,
      wert: Math.round(v)
    });
    for (let m = 0; m < 12; m++) v = v * (1 + r) + monatsSparrate;
  }
  return arr;
}
